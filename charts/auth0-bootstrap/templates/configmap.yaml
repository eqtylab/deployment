{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auth0-bootstrap.fullname" . }}-scripts
  labels:
    {{- include "auth0-bootstrap.labels" . | nindent 4 }}
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # Configuration from environment
    AUTH0_DOMAIN="${AUTH0_DOMAIN}"
    AUTH0_MGMT_CLIENT_ID="${AUTH0_MGMT_CLIENT_ID}"
    AUTH0_MGMT_CLIENT_SECRET="${AUTH0_MGMT_CLIENT_SECRET}"
    AUTH0_API_URL="https://${AUTH0_DOMAIN}/api/v2"
    AUTH0_AUDIENCE="https://${AUTH0_DOMAIN}/api/v2/"

    echo "Starting Auth0 bootstrap process..."
    echo "Auth0 Domain: ${AUTH0_DOMAIN}"

    # Function to get Management API token
    get_mgmt_token() {
      echo "Getting Management API token..."
      TOKEN_RESPONSE=$(curl -s -X POST "https://${AUTH0_DOMAIN}/oauth/token" \
        -H "Content-Type: application/json" \
        -d "{
          \"client_id\": \"${AUTH0_MGMT_CLIENT_ID}\",
          \"client_secret\": \"${AUTH0_MGMT_CLIENT_SECRET}\",
          \"audience\": \"${AUTH0_AUDIENCE}\",
          \"grant_type\": \"client_credentials\"
        }")

      TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

      if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
        echo "${RED}Failed to get Management API token${NC}"
        echo "Response: $TOKEN_RESPONSE"
        return 1
      fi
      echo "${GREEN}Successfully obtained Management API token${NC}"
      return 0
    }

    # Function to check if an application exists by name
    get_client_by_name() {
      local APP_NAME=$1
      curl -s -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/clients?fields=client_id,name&include_fields=true" \
        | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .client_id'
    }

    # Function to create a SPA application
    create_spa_app() {
      local APP_NAME=$1
      local CALLBACKS=$2
      local LOGOUT_URLS=$3
      local WEB_ORIGINS=$4

      echo "Creating SPA application: ${APP_NAME}..."

      EXISTING=$(get_client_by_name "$APP_NAME")
      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
        echo "  Application already exists (client_id: ${EXISTING})"
        return 0
      fi

      APP_CONFIG=$(cat <<EOF
    {
      "name": "${APP_NAME}",
      "app_type": "spa",
      "callbacks": ${CALLBACKS},
      "allowed_logout_urls": ${LOGOUT_URLS},
      "web_origins": ${WEB_ORIGINS},
      "token_endpoint_auth_method": "none",
      "oidc_conformant": true,
      "grant_types": ["authorization_code", "implicit", "refresh_token"]
    }
    EOF
    )

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${AUTH0_API_URL}/clients" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${APP_CONFIG}")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "201" ]; then
        CLIENT_ID=$(echo "$BODY" | jq -r '.client_id')
        echo "  ${GREEN}Created SPA application (client_id: ${CLIENT_ID})${NC}"
        return 0
      else
        echo "  ${RED}Failed to create SPA application (HTTP ${HTTP_CODE})${NC}"
        echo "  Response: $BODY"
        return 1
      fi
    }

    # Function to create an M2M application
    create_m2m_app() {
      local APP_NAME=$1

      echo "Creating M2M application: ${APP_NAME}..."

      EXISTING=$(get_client_by_name "$APP_NAME")
      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
        echo "  Application already exists (client_id: ${EXISTING})"
        return 0
      fi

      APP_CONFIG=$(cat <<EOF
    {
      "name": "${APP_NAME}",
      "app_type": "non_interactive",
      "token_endpoint_auth_method": "client_secret_post",
      "oidc_conformant": true,
      "grant_types": ["client_credentials"]
    }
    EOF
    )

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${AUTH0_API_URL}/clients" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${APP_CONFIG}")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "201" ]; then
        CLIENT_ID=$(echo "$BODY" | jq -r '.client_id')
        CLIENT_SECRET=$(echo "$BODY" | jq -r '.client_secret')
        echo "  ${GREEN}Created M2M application (client_id: ${CLIENT_ID})${NC}"
        echo "  ${YELLOW}Client Secret: ${CLIENT_SECRET}${NC}"
        echo "  Save this secret — you will need it for Kubernetes secrets."
        return 0
      else
        echo "  ${RED}Failed to create M2M application (HTTP ${HTTP_CODE})${NC}"
        echo "  Response: $BODY"
        return 1
      fi
    }

    # Function to check if an API exists by identifier
    get_api_by_identifier() {
      local IDENTIFIER=$1
      curl -s -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/resource-servers" \
        | jq -r --arg id "$IDENTIFIER" '.[] | select(.identifier == $id) | .id'
    }

    # Function to create an API (resource server) with permissions
    create_api() {
      local API_NAME=$1
      local API_IDENTIFIER=$2
      local PERMISSIONS=$3

      echo "Creating API: ${API_NAME} (${API_IDENTIFIER})..."

      EXISTING=$(get_api_by_identifier "$API_IDENTIFIER")
      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
        echo "  API already exists (id: ${EXISTING})"

        # Update permissions on existing API
        echo "  Updating permissions..."
        RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH "${AUTH0_API_URL}/resource-servers/${EXISTING}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"scopes\": ${PERMISSIONS}}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        if [ "$HTTP_CODE" = "200" ]; then
          echo "  ${GREEN}Permissions updated${NC}"
        else
          echo "  ${YELLOW}Failed to update permissions (HTTP ${HTTP_CODE})${NC}"
        fi
        return 0
      fi

      API_CONFIG=$(cat <<EOF
    {
      "name": "${API_NAME}",
      "identifier": "${API_IDENTIFIER}",
      "signing_alg": "RS256",
      "token_lifetime": {{ .Values.auth0.api.tokenLifetime }},
      "allow_offline_access": {{ .Values.auth0.api.allowOfflineAccess }},
      "scopes": ${PERMISSIONS}
    }
    EOF
    )

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${AUTH0_API_URL}/resource-servers" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${API_CONFIG}")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "201" ]; then
        API_ID=$(echo "$BODY" | jq -r '.id')
        echo "  ${GREEN}Created API (id: ${API_ID})${NC}"
        return 0
      else
        echo "  ${RED}Failed to create API (HTTP ${HTTP_CODE})${NC}"
        echo "  Response: $BODY"
        return 1
      fi
    }

    # Function to grant an M2M client access to an API
    grant_client_api_access() {
      local CLIENT_NAME=$1
      local API_IDENTIFIER=$2
      local SCOPES=$3

      echo "Granting '${CLIENT_NAME}' access to API '${API_IDENTIFIER}'..."

      CLIENT_ID=$(get_client_by_name "$CLIENT_NAME")
      if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "null" ]; then
        echo "  ${YELLOW}Client ${CLIENT_NAME} not found, skipping grant${NC}"
        return 1
      fi

      # Check if grant already exists
      EXISTING_GRANT=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/client-grants?client_id=${CLIENT_ID}&audience=${API_IDENTIFIER}" \
        | jq -r '.[0].id // empty')

      if [ -n "$EXISTING_GRANT" ]; then
        echo "  Grant already exists, updating scopes..."
        RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH "${AUTH0_API_URL}/client-grants/${EXISTING_GRANT}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"scope\": ${SCOPES}}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        if [ "$HTTP_CODE" = "200" ]; then
          echo "  ${GREEN}Grant updated${NC}"
        else
          echo "  ${YELLOW}Failed to update grant (HTTP ${HTTP_CODE})${NC}"
        fi
        return 0
      fi

      GRANT_CONFIG=$(cat <<EOF
    {
      "client_id": "${CLIENT_ID}",
      "audience": "${API_IDENTIFIER}",
      "scope": ${SCOPES}
    }
    EOF
    )

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${AUTH0_API_URL}/client-grants" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${GRANT_CONFIG}")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "201" ]; then
        echo "  ${GREEN}Grant created${NC}"
        return 0
      else
        echo "  ${RED}Failed to create grant (HTTP ${HTTP_CODE})${NC}"
        echo "  Response: $BODY"
        return 1
      fi
    }

    # Function to grant an M2M client access to the Management API
    grant_mgmt_api_access() {
      local CLIENT_NAME=$1
      local SCOPES=$2

      grant_client_api_access "$CLIENT_NAME" "${AUTH0_AUDIENCE}" "$SCOPES"
    }

    # Function to look up an action by name (echoes action ID or empty)
    get_action_by_name() {
      local ACTION_NAME=$1
      curl -s -G \
        --data-urlencode "actionName=${ACTION_NAME}" \
        -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/actions/actions" \
        | jq -r --arg name "$ACTION_NAME" \
            '.actions[]? | select(.name == $name) | .id' | head -n 1
    }

    # Function to create or update an action and deploy it (echoes action ID)
    create_or_update_action() {
      local ACTION_NAME=$1
      local CODE_FILE=$2
      local TRIGGER_ID=$3
      local TRIGGER_VERSION=$4
      local RUNTIME=$5
      local DEPENDENCIES_JSON=$6
      local SECRETS_JSON=$7

      if [ ! -f "$CODE_FILE" ]; then
        echo "  ${RED}Action code file not found: ${CODE_FILE}${NC}" >&2
        return 1
      fi

      local CODE_JSON
      CODE_JSON=$(jq -Rs '.' < "$CODE_FILE")

      local TRIGGER_JSON
      TRIGGER_JSON=$(jq -n \
        --arg id "$TRIGGER_ID" \
        --arg ver "$TRIGGER_VERSION" \
        '[{id: $id, version: $ver}]')

      local PAYLOAD
      PAYLOAD=$(jq -n \
        --arg name "$ACTION_NAME" \
        --argjson code "$CODE_JSON" \
        --arg runtime "$RUNTIME" \
        --argjson deps "$DEPENDENCIES_JSON" \
        --argjson secrets "$SECRETS_JSON" \
        --argjson triggers "$TRIGGER_JSON" \
        '{name: $name, code: $code, runtime: $runtime, dependencies: $deps, secrets: $secrets, supported_triggers: $triggers}')

      local EXISTING
      EXISTING=$(get_action_by_name "$ACTION_NAME")

      local ACTION_ID=""
      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
        echo "Updating action '${ACTION_NAME}' (id: ${EXISTING})..." >&2
        local RESPONSE
        RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
          "${AUTH0_API_URL}/actions/actions/${EXISTING}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")
        local HTTP_CODE
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        local BODY
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [ "$HTTP_CODE" = "200" ]; then
          echo "  ${GREEN}Action updated${NC}" >&2
          ACTION_ID="$EXISTING"
        else
          echo "  ${RED}Failed to update action (HTTP ${HTTP_CODE})${NC}" >&2
          echo "  Response: $BODY" >&2
          return 1
        fi
      else
        echo "Creating action '${ACTION_NAME}'..." >&2
        local RESPONSE
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          "${AUTH0_API_URL}/actions/actions" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")
        local HTTP_CODE
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        local BODY
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [ "$HTTP_CODE" = "201" ]; then
          ACTION_ID=$(echo "$BODY" | jq -r '.id')
          echo "  ${GREEN}Created action (id: ${ACTION_ID})${NC}" >&2
        else
          echo "  ${RED}Failed to create action (HTTP ${HTTP_CODE})${NC}" >&2
          echo "  Response: $BODY" >&2
          return 1
        fi
      fi

      # Deploy the action so its latest code becomes the active version
      echo "Deploying action ${ACTION_ID}..." >&2
      local DEPLOY_RESPONSE
      DEPLOY_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
        "${AUTH0_API_URL}/actions/actions/${ACTION_ID}/deploy" \
        -H "Authorization: Bearer ${TOKEN}")
      local DEPLOY_HTTP
      DEPLOY_HTTP=$(echo "$DEPLOY_RESPONSE" | tail -1)
      if [ "$DEPLOY_HTTP" = "200" ]; then
        echo "  ${GREEN}Action deployed${NC}" >&2
      else
        echo "  ${YELLOW}Deploy returned HTTP ${DEPLOY_HTTP} (action may not be ready yet)${NC}" >&2
      fi

      echo "$ACTION_ID"
    }

    # Function to bind an action to a trigger, preserving existing bindings
    bind_action_to_trigger() {
      local TRIGGER_ID=$1
      local ACTION_ID=$2
      local DISPLAY_NAME=$3

      echo "Binding action ${ACTION_ID} to trigger '${TRIGGER_ID}'..." >&2

      local CURRENT
      CURRENT=$(curl -s \
        -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/actions/triggers/${TRIGGER_ID}/bindings")

      # Reshape existing bindings to the {ref, display_name} form PATCH expects
      local EXISTING_BINDINGS
      EXISTING_BINDINGS=$(echo "$CURRENT" | jq -c '
        [ .bindings[]? | {
            ref: { type: "action_id", value: .action.id },
            display_name: (.display_name // .action.name)
          } ]')

      local ALREADY
      ALREADY=$(echo "$EXISTING_BINDINGS" | jq --arg id "$ACTION_ID" \
        '[ .[] | select(.ref.value == $id) ] | length')

      local NEW_BINDINGS
      if [ "$ALREADY" -gt 0 ]; then
        echo "  Binding already exists, leaving order unchanged" >&2
        NEW_BINDINGS="$EXISTING_BINDINGS"
      else
        NEW_BINDINGS=$(echo "$EXISTING_BINDINGS" | jq \
          --arg id "$ACTION_ID" \
          --arg name "$DISPLAY_NAME" \
          '. + [{ ref: { type: "action_id", value: $id }, display_name: $name }]')
      fi

      local PAYLOAD
      PAYLOAD=$(jq -n --argjson bindings "$NEW_BINDINGS" '{bindings: $bindings}')

      local RESPONSE
      RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
        "${AUTH0_API_URL}/actions/triggers/${TRIGGER_ID}/bindings" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")
      local HTTP_CODE
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      local BODY
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "200" ]; then
        echo "  ${GREEN}Binding updated${NC}" >&2
        return 0
      else
        echo "  ${RED}Failed to bind action (HTTP ${HTTP_CODE})${NC}" >&2
        echo "  Response: $BODY" >&2
        return 1
      fi
    }

    # Function to create a user
    create_user() {
      local EMAIL=$1
      local PASSWORD=$2
      local FIRST_NAME=$3
      local LAST_NAME=$4
      local CONNECTION=$5

      echo "Creating user: ${EMAIL}..."

      # Check if user exists
      EXISTING=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
        "${AUTH0_API_URL}/users-by-email?email=$(echo "$EMAIL" | jq -Rr @uri)" \
        | jq -r '.[0].user_id // empty')

      if [ -n "$EXISTING" ]; then
        echo "  User already exists (user_id: ${EXISTING})"
        return 0
      fi

      USER_CONFIG=$(cat <<EOF
    {
      "email": "${EMAIL}",
      "password": "${PASSWORD}",
      "given_name": "${FIRST_NAME}",
      "family_name": "${LAST_NAME}",
      "name": "${FIRST_NAME} ${LAST_NAME}",
      "connection": "${CONNECTION}",
      "email_verified": true
    }
    EOF
    )

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${AUTH0_API_URL}/users" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${USER_CONFIG}")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "201" ]; then
        USER_ID=$(echo "$BODY" | jq -r '.user_id')
        echo "  ${GREEN}User created (user_id: ${USER_ID})${NC}"
        return 0
      elif [ "$HTTP_CODE" = "409" ]; then
        echo "  User already exists"
        return 0
      else
        echo "  ${RED}Failed to create user (HTTP ${HTTP_CODE})${NC}"
        echo "  Response: $BODY"
        return 1
      fi
    }

    # Main bootstrap process
    main() {
      # Get Management API token
      if ! get_mgmt_token; then
        echo "Failed to authenticate with Auth0 Management API"
        exit 1
      fi

      # Build permissions JSON array
      PERMISSIONS='[
      {{- $first := true }}
      {{- range .Values.scopes }}
      {{- if not $first }},{{ end }}
        {"value": "{{ .name }}", "description": "{{ .description }}"}
      {{- $first = false }}
      {{- end }}
      ]'

      # Create API with permissions
      create_api \
        "{{ .Values.auth0.api.name }}" \
        "{{ .Values.auth0.api.identifier }}" \
        "$PERMISSIONS"

      # Create frontend SPA application
      {{- with .Values.applications.frontend }}
      create_spa_app \
        "{{ .name }}" \
        '{{ .callbacks | toJson }}' \
        '{{ .logoutUrls | toJson }}' \
        '{{ .webOrigins | toJson }}'
      {{- end }}

      # Create backend M2M application
      {{- with .Values.applications.backend }}
      create_m2m_app "{{ .name }}"
      {{- end }}

      # Create worker M2M application
      {{- with .Values.applications.worker }}
      create_m2m_app "{{ .name }}"
      {{- end }}

      # Grant backend M2M app access to the governance API
      {{- with .Values.applications.backend }}
      {{- if .apiScopes }}
      grant_client_api_access \
        "{{ .name }}" \
        "{{ $.Values.auth0.api.identifier }}" \
        '{{ .apiScopes | toJson }}'
      {{- end }}
      {{- end }}

      # Grant backend M2M app access to the Management API (for user management)
      {{- with .Values.applications.backend }}
      {{- if .managementApiScopes }}
      grant_mgmt_api_access \
        "{{ .name }}" \
        '{{ .managementApiScopes | toJson }}'
      {{- end }}
      {{- end }}

      # Grant worker M2M app access to the governance API
      {{- with .Values.applications.worker }}
      {{- if .apiScopes }}
      grant_client_api_access \
        "{{ .name }}" \
        "{{ $.Values.auth0.api.identifier }}" \
        '{{ .apiScopes | toJson }}'
      {{- end }}
      {{- end }}

      # Create admin user
      {{- if .Values.users.admin.enabled }}
      ADMIN_PASSWORD="${ADMIN_USER_PASSWORD}"
      create_user \
        "{{ .Values.users.admin.email }}" \
        "${ADMIN_PASSWORD}" \
        "{{ .Values.users.admin.firstName }}" \
        "{{ .Values.users.admin.lastName }}" \
        "{{ .Values.users.admin.connection }}"
      {{- end }}

      # Create test users
      {{- if .Values.users.testUsers.enabled }}
      {{- range .Values.users.testUsers.users }}
      create_user \
        "{{ .email }}" \
        "{{ .password }}" \
        "{{ .firstName }}" \
        "{{ .lastName }}" \
        "{{ $.Values.users.admin.connection }}"
      {{- end }}
      {{- end }}

      # Create / update / deploy / bind Auth0 Actions
      {{- if .Values.actions.enabled }}
      echo ""
      echo "Configuring Auth0 Actions..."

      {{- if .Values.actions.postLogin.enabled }}
      {{- with .Values.actions.postLogin }}
      echo ""
      PL_SECRETS=$(jq -n \
        --arg url_dev   "{{ .authService.urlDev }}" \
        --arg url_stag  "{{ .authService.urlStaging }}" \
        --arg url_prod  "{{ .authService.urlProduction }}" \
        --arg url       "{{ .authService.url }}" \
        --arg api_secret "${AUTH0_AUTH_SERVICE_API_SECRET:-}" \
        '[
           {name: "AUTH_SERVICE_URL_DEV",        value: $url_dev},
           {name: "AUTH_SERVICE_URL_STAGING",    value: $url_stag},
           {name: "AUTH_SERVICE_URL_PRODUCTION", value: $url_prod},
           {name: "AUTH_SERVICE_URL",            value: $url},
           {name: "AUTH_SERVICE_API_SECRET",     value: $api_secret}
         ] | map(select(.value != ""))')

      PL_ID=$(create_or_update_action \
        "{{ .name }}" \
        "/actions/{{ .codeFile }}" \
        "{{ .trigger.id }}" \
        "{{ .trigger.version }}" \
        "{{ .runtime }}" \
        '{{ .dependencies | toJson }}' \
        "$PL_SECRETS")
      if [ -n "$PL_ID" ]; then
        bind_action_to_trigger "{{ .trigger.id }}" "$PL_ID" "{{ .name }}"
      fi
      {{- end }}
      {{- end }}

      {{- if .Values.actions.clientCredentialsExchange.enabled }}
      {{- with .Values.actions.clientCredentialsExchange }}
      echo ""
      CCE_SECRETS=$(jq -n \
        --arg domain        "{{ $.Values.auth0.domain }}" \
        --arg client_id     "${AUTH0_MGMT_CLIENT_ID}" \
        --arg client_secret "${AUTH0_MGMT_CLIENT_SECRET}" \
        '[
           {name: "domain",       value: $domain},
           {name: "clientId",     value: $client_id},
           {name: "clientSecret", value: $client_secret}
         ] | map(select(.value != ""))')

      CCE_ID=$(create_or_update_action \
        "{{ .name }}" \
        "/actions/{{ .codeFile }}" \
        "{{ .trigger.id }}" \
        "{{ .trigger.version }}" \
        "{{ .runtime }}" \
        '{{ .dependencies | toJson }}' \
        "$CCE_SECRETS")
      if [ -n "$CCE_ID" ]; then
        bind_action_to_trigger "{{ .trigger.id }}" "$CCE_ID" "{{ .name }}"
      fi
      {{- end }}
      {{- end }}
      {{- end }}

      echo ""
      echo "${GREEN}Auth0 bootstrap completed successfully!${NC}"
      echo ""
      echo "Next steps:"
      echo "  1. Retrieve the client IDs and secrets from the output above"
      echo "  2. Create Kubernetes secrets with: kubectl create secret generic platform-auth0 ..."
      echo "  3. Deploy the governance-platform chart"
    }

    # Run main function
    main
{{- end }}
