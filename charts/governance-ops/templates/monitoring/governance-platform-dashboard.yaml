{{- if .Values.dashboards.enabled }}
{{- if .Values.dashboards.platformOverview.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "governance-ops.targetRelease" . }}-governance-platform-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "governance-ops.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  governance-platform.json: |-
{{ .Files.Get "dashboards/governance-platform.json" | indent 4 }}
{{- end }}
{{- end }}
