{{- if .Values.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "governance-ops.targetRelease" . }}-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "governance-ops.labels" . | nindent 4 }}
    # Required label for kube-prometheus-stack to pick up this rule
    release: kube-prometheus-stack
    {{- with .Values.alerts.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.alerts.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    - name: {{ include "governance-ops.targetRelease" . }}.platform-health
      interval: {{ .Values.alerts.interval }}
      rules:
        {{- if .Values.alerts.rules.serviceDown.enabled }}
        - alert: GovernancePlatformServiceDown
          expr: |
            kube_deployment_status_replicas_available{deployment=~"{{ include "governance-ops.targetRelease" . }}.*"} == 0
          for: {{ .Values.alerts.rules.serviceDown.for }}
          labels:
            severity: {{ .Values.alerts.rules.serviceDown.severity }}
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Governance Platform service {{ "{{ $labels.deployment }}" }} has no available replicas"
            description: "Deployment {{ "{{ $labels.deployment }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been unavailable for {{ .Values.alerts.rules.serviceDown.for }}."
        {{- end }}

        {{- if .Values.alerts.rules.podNotReady.enabled }}
        - alert: GovernancePlatformPodNotReady
          expr: |
            kube_pod_status_ready{pod=~"{{ include "governance-ops.targetRelease" . }}.*",condition="true"} == 0
          for: {{ .Values.alerts.rules.podNotReady.for }}
          labels:
            severity: {{ .Values.alerts.rules.podNotReady.severity }}
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} not ready"
            description: "Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been in a not-ready state for {{ .Values.alerts.rules.podNotReady.for }}."
        {{- end }}

        {{- if .Values.alerts.rules.highErrorRate.enabled }}
        - alert: GovernancePlatformErrorRateWarning
          expr: |
            (
              sum by (exported_namespace, ingress) (rate(nginx_ingress_controller_requests{ingress=~"{{ include "governance-ops.targetRelease" . }}.*", status=~"5.."}[5m]))
              /
              sum by (exported_namespace, ingress) (rate(nginx_ingress_controller_requests{ingress=~"{{ include "governance-ops.targetRelease" . }}.*"}[5m]))
            ) > {{ .Values.alerts.rules.highErrorRate.warningThreshold }}
          for: {{ .Values.alerts.rules.highErrorRate.warningFor }}
          labels:
            severity: warning
            namespace: "{{ "{{ $labels.exported_namespace }}" }}"
            service: "{{ "{{ $labels.ingress }}" }}"
          annotations:
            summary: "Elevated 5xx error rate - {{ "{{ $labels.ingress }}" }}"
            description: 'Service {{ "{{ $labels.ingress }}" }} in namespace {{ "{{ $labels.exported_namespace }}" }} is experiencing {{ "{{ humanizePercentage $value }}" }} error rate (threshold: {{ printf "%.1f%%" (mulf (.Values.alerts.rules.highErrorRate.warningThreshold | float64) 100) }}). Investigation recommended.'

        - alert: GovernancePlatformErrorRateCritical
          expr: |
            (
              sum by (exported_namespace, ingress) (rate(nginx_ingress_controller_requests{ingress=~"{{ include "governance-ops.targetRelease" . }}.*", status=~"5.."}[5m]))
              /
              sum by (exported_namespace, ingress) (rate(nginx_ingress_controller_requests{ingress=~"{{ include "governance-ops.targetRelease" . }}.*"}[5m]))
            ) > {{ .Values.alerts.rules.highErrorRate.criticalThreshold }}
          for: {{ .Values.alerts.rules.highErrorRate.criticalFor }}
          labels:
            severity: critical
            namespace: "{{ "{{ $labels.exported_namespace }}" }}"
            service: "{{ "{{ $labels.ingress }}" }}"
          annotations:
            summary: "Critical 5xx error rate - {{ "{{ $labels.ingress }}" }} degraded"
            description: 'Service {{ "{{ $labels.ingress }}" }} in namespace {{ "{{ $labels.exported_namespace }}" }} is experiencing {{ "{{ humanizePercentage $value }}" }} error rate. Immediate action required.'
        {{- end }}

        {{- if .Values.alerts.rules.podCrashLooping.enabled }}
        - alert: GovernancePlatformPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{pod=~"{{ include "governance-ops.targetRelease" . }}.*"}[15m]) > 0
          for: {{ .Values.alerts.rules.podCrashLooping.for }}
          labels:
            severity: {{ .Values.alerts.rules.podCrashLooping.severity }}
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} is crash looping"
            description: "Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} (container: {{ "{{ $labels.container }}" }}) is restarting frequently."
        {{- end }}

        {{- if .Values.alerts.rules.highMemoryUsage.enabled }}
        - alert: GovernancePlatformMemoryUsageWarning
          expr: |
            (
              sum(container_memory_working_set_bytes{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""}) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{pod=~"{{ include "governance-ops.targetRelease" . }}.*", resource="memory"}) by (pod, namespace)
            ) > {{ .Values.alerts.rules.highMemoryUsage.warningThreshold }}
          for: {{ .Values.alerts.rules.highMemoryUsage.warningFor }}
          labels:
            severity: warning
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} elevated memory usage"
            description: 'Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} is using {{ "{{ humanizePercentage $value }}" }} of its memory limit (threshold: {{ printf "%.1f%%" (mulf (.Values.alerts.rules.highMemoryUsage.warningThreshold | float64) 100) }}). May indicate capacity issues or memory leak.'

        - alert: GovernancePlatformMemoryUsageCritical
          expr: |
            (
              sum(container_memory_working_set_bytes{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""}) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{pod=~"{{ include "governance-ops.targetRelease" . }}.*", resource="memory"}) by (pod, namespace)
            ) > {{ .Values.alerts.rules.highMemoryUsage.criticalThreshold }}
          for: {{ .Values.alerts.rules.highMemoryUsage.criticalFor }}
          labels:
            severity: critical
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} critical memory usage - OOM imminent"
            description: 'Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} is using {{ "{{ humanizePercentage $value }}" }} of its memory limit. Risk of OOM kill.'
        {{- end }}

        {{- if .Values.alerts.rules.memorySpike.enabled }}
        - alert: GovernancePlatformMemorySpike
          expr: |
            (
              sum(container_memory_working_set_bytes{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""}) by (pod, namespace)
              -
              sum(container_memory_working_set_bytes{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""} offset 5m) by (pod, namespace)
            ) / sum(container_memory_working_set_bytes{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""} offset 5m) by (pod, namespace)
            > {{ .Values.alerts.rules.memorySpike.threshold }}
          for: {{ .Values.alerts.rules.memorySpike.for }}
          labels:
            severity: warning
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} memory spike detected"
            description: 'Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} memory increased by {{ "{{ humanizePercentage $value }}" }} in the last 5 minutes. Possible memory leak or deployment issue.'
        {{- end }}

        {{- if .Values.alerts.rules.highCpuUsage.enabled }}
        - alert: GovernancePlatformCPUUsageWarning
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""}[5m])) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{pod=~"{{ include "governance-ops.targetRelease" . }}.*", resource="cpu"}) by (pod, namespace)
            ) > {{ .Values.alerts.rules.highCpuUsage.warningThreshold }}
          for: {{ .Values.alerts.rules.highCpuUsage.warningFor }}
          labels:
            severity: warning
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} elevated CPU usage"
            description: 'Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} is using {{ "{{ humanizePercentage $value }}" }} of its CPU limit (threshold: {{ printf "%.1f%%" (mulf (.Values.alerts.rules.highCpuUsage.warningThreshold | float64) 100) }}). May indicate capacity issues.'

        - alert: GovernancePlatformCPUUsageCritical
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{pod=~"{{ include "governance-ops.targetRelease" . }}.*", container!=""}[5m])) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{pod=~"{{ include "governance-ops.targetRelease" . }}.*", resource="cpu"}) by (pod, namespace)
            ) > {{ .Values.alerts.rules.highCpuUsage.criticalThreshold }}
          for: {{ .Values.alerts.rules.highCpuUsage.criticalFor }}
          labels:
            severity: critical
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Pod {{ "{{ $labels.pod }}" }} critical CPU usage - throttling imminent"
            description: 'Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} is using {{ "{{ humanizePercentage $value }}" }} of its CPU limit. Performance degradation likely.'
        {{- end }}

        {{- if .Values.alerts.rules.persistentVolumeUsage.enabled }}
        - alert: GovernancePlatformPersistentVolumeWarning
          expr: |
            (
              kubelet_volume_stats_used_bytes{persistentvolumeclaim=~".*{{ include "governance-ops.targetRelease" . }}.*"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=~".*{{ include "governance-ops.targetRelease" . }}.*"}
            ) > {{ .Values.alerts.rules.persistentVolumeUsage.warningThreshold }}
          for: {{ .Values.alerts.rules.persistentVolumeUsage.warningFor }}
          labels:
            severity: warning
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "PersistentVolume {{ "{{ $labels.persistentvolumeclaim }}" }} elevated usage"
            description: 'PersistentVolume {{ "{{ $labels.persistentvolumeclaim }}" }} in namespace {{ "{{ $labels.namespace }}" }} is {{ "{{ humanizePercentage $value }}" }} full. Consider planning storage expansion.'

        - alert: GovernancePlatformPersistentVolumeCritical
          expr: |
            (
              kubelet_volume_stats_used_bytes{persistentvolumeclaim=~".*{{ include "governance-ops.targetRelease" . }}.*"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=~".*{{ include "governance-ops.targetRelease" . }}.*"}
            ) > {{ .Values.alerts.rules.persistentVolumeUsage.criticalThreshold }}
          for: {{ .Values.alerts.rules.persistentVolumeUsage.criticalFor }}
          labels:
            severity: critical
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "PersistentVolume {{ "{{ $labels.persistentvolumeclaim }}" }} critically full"
            description: 'PersistentVolume {{ "{{ $labels.persistentvolumeclaim }}" }} in namespace {{ "{{ $labels.namespace }}" }} is {{ "{{ humanizePercentage $value }}" }} full. Immediate action required to prevent service disruption.'
        {{- end }}

        {{- /* Only create endpoint down alert if blackbox-exporter is available */ -}}
        {{- if and .Values.alerts.rules.endpointDown.enabled (include "governance-ops.blackboxAvailable" $) }}
        - alert: GovernancePlatformEndpointDown
          expr: |
            probe_success{job=~"probe/monitoring/governance-ops-.*"} == 0
          for: {{ .Values.alerts.rules.endpointDown.for }}
          labels:
            severity: {{ .Values.alerts.rules.endpointDown.severity }}
            namespace: "{{ "{{ $labels.namespace }}" }}"
          annotations:
            summary: "Endpoint {{ "{{ $labels.target }}" }} is down"
            description: "HTTPS endpoint {{ "{{ $labels.target }}" }} has been failing health checks for {{ .Values.alerts.rules.endpointDown.for }}. The service may be unavailable."
        {{- end }}

{{- if .Values.alerts.customRules }}
{{- toYaml .Values.alerts.customRules | nindent 8 }}
{{- end }}
{{- end }}
