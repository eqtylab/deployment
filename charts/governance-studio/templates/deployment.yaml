{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "governance-studio.fullname" . }}
  labels:
    {{- include "governance-studio.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "governance-studio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "governance-studio.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if and .Values.global (((.Values.global).secrets).imageRegistry).secretName }}
      imagePullSecrets:
        - name: {{ ((.Values.global).secrets).imageRegistry.secretName }}
      {{- else if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "governance-studio.fullname" .) }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: copy-assets
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - cp -r /opt/app-root/src/. /mnt/src/
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: app-src
              mountPath: /mnt/src
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "governance-studio.fullname" . }}-config
          ports:
            - name: http
              containerPort: {{ .Values.containerPort | default .Values.service.port }}
              protocol: TCP
          {{- $basePath := trimSuffix "/" (.Values.config.basePath | default "/") }}
          {{- if .Values.startupProbe }}
          startupProbe:
            {{- $probe := deepCopy .Values.startupProbe }}
            {{- if $probe.httpGet }}
              {{- $_ := set $probe.httpGet "path" (printf "%s%s" $basePath ($probe.httpGet.path | default "/")) }}
            {{- end }}
            {{- toYaml $probe | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- $probe := deepCopy .Values.livenessProbe }}
            {{- if $probe.httpGet }}
              {{- $_ := set $probe.httpGet "path" (printf "%s%s" $basePath ($probe.httpGet.path | default "/")) }}
            {{- end }}
            {{- toYaml $probe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- $probe := deepCopy .Values.readinessProbe }}
            {{- if $probe.httpGet }}
              {{- $_ := set $probe.httpGet "path" (printf "%s%s" $basePath ($probe.httpGet.path | default "/")) }}
            {{- end }}
            {{- toYaml $probe | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: app-src
              mountPath: /opt/app-root/src
            - name: nginx-d
              mountPath: /opt/app-root/etc/nginx.d
            - name: nginx-log
              mountPath: /var/log/nginx
            - name: nginx-lib-tmp
              mountPath: /var/lib/nginx/tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: app-src
          emptyDir: {}
        - name: nginx-d
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
        - name: nginx-lib-tmp
          emptyDir: {}
{{- end }}
