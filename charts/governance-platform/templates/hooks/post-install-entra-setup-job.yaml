{{- if .Values.entra.createOrganization }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "governance-platform.fullname" . }}-post-install-entra-setup
  labels:
    {{- include "governance-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: entra-org-setup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "governance-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: entra-org-setup
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: create-org
          image: postgres:17-alpine
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              echo "Waiting for database to be ready..."
              until pg_isready -h $PGHOST -p 5432 -U $PGUSER; do
                echo "Database not ready yet..."
                sleep 5
              done

              echo "Creating Entra organization..."

              ORG_NAME="{{ .Values.entra.organizationName }}"

              # Check if organization already exists
              EXISTS=$(psql \
                -t -c "SELECT COUNT(*) FROM organization WHERE name = '${ORG_NAME}';" | tr -d ' ')

              if [ "$EXISTS" = "1" ]; then
                echo "Organization '${ORG_NAME}' already exists"
                # Update to ensure idp_provider is set correctly
                psql -c "UPDATE organization SET idp_provider = 'entra', display_name = '{{ .Values.entra.displayName | default .Values.entra.organizationName }}', updated_at = NOW() WHERE name = '${ORG_NAME}';"
                echo "Updated organization to use Entra IDP"
              else
                # Create new organization
                psql -c "INSERT INTO organization (name, description, display_name, idp_provider, settings, created_at, updated_at) \
                      VALUES ('${ORG_NAME}', '${ORG_NAME}', '{{ .Values.entra.displayName | default .Values.entra.organizationName }}', 'entra', '{}', NOW(), NOW());"
                echo "Created organization '${ORG_NAME}'"
              fi

              # Show the organization
              psql \
                -c "SELECT id, name, display_name, idp_provider FROM organization WHERE name = '${ORG_NAME}';"

              {{- if .Values.entra.createPlatformAdmin }}
              {{- if not .Values.entra.platformAdminEmail }}
              {{- fail "entra.platformAdminEmail is required when entra.createPlatformAdmin is true. Must be an email that exists in your Entra tenant." }}
              {{- end }}
              {{- $adminEmail := .Values.entra.platformAdminEmail }}
              echo "Creating platform-admin user..."

              # Install curl and jq for Graph API calls
              apk add --no-cache curl jq > /dev/null 2>&1

              ADMIN_EMAIL="{{ $adminEmail }}"
              echo "Looking up Entra user by email: $ADMIN_EMAIL"

              # Get Graph API access token using client credentials flow
              TOKEN_RESPONSE=$(curl -s -X POST \
                "https://login.microsoftonline.com/${ENTRA_TENANT_ID}/oauth2/v2.0/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "client_id=${ENTRA_CLIENT_ID}" \
                -d "client_secret=${ENTRA_CLIENT_SECRET}" \
                -d "scope=https://graph.microsoft.com/.default" \
                -d "grant_type=client_credentials") || true

              GRAPH_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

              if [ -z "$GRAPH_TOKEN" ] || [ "$GRAPH_TOKEN" = "null" ]; then
                echo "ERROR: Failed to get Graph API access token"
                echo "Response: $TOKEN_RESPONSE"
                exit 1
              fi

              # Look up user by email in Entra via Graph API
              # Try mail field first, then userPrincipalName
              ENTRA_USER=$(curl -s \
                -H "Authorization: Bearer $GRAPH_TOKEN" \
                "https://graph.microsoft.com/v1.0/users?\$filter=mail%20eq%20'${ADMIN_EMAIL}'%20or%20userPrincipalName%20eq%20'${ADMIN_EMAIL}'&\$select=id,mail,displayName,givenName,surname") || true

              ENTRA_USER_ID=$(echo "$ENTRA_USER" | jq -r '.value[0].id')
              ENTRA_DISPLAY_NAME=$(echo "$ENTRA_USER" | jq -r '.value[0].displayName // "Platform Admin"')
              ENTRA_GIVEN_NAME=$(echo "$ENTRA_USER" | jq -r '.value[0].givenName // "Platform"')
              ENTRA_SURNAME=$(echo "$ENTRA_USER" | jq -r '.value[0].surname // "Admin"')

              if [ -z "$ENTRA_USER_ID" ] || [ "$ENTRA_USER_ID" = "null" ]; then
                echo "ERROR: Could not find user with email $ADMIN_EMAIL in Entra tenant"
                echo "Make sure the user exists in your Microsoft Entra ID tenant"
                exit 1
              fi

              echo "Found Entra user ID: $ENTRA_USER_ID"

              # Generate UUIDs using PostgreSQL
              USER_ID=$(psql -t -c "SELECT gen_random_uuid();" | tr -d ' ')

              # Check if user exists (by email or by idp composite key)
              USER_EXISTS=$(psql \
                -t -c "SELECT COUNT(*) FROM users WHERE email = '$ADMIN_EMAIL' OR (idp_provider = 'entra' AND idp_user_id = '$ENTRA_USER_ID');" | tr -d ' ')

              if [ "$USER_EXISTS" != "0" ]; then
                echo "Platform admin user already exists"
                USER_ID=$(psql -t -c "SELECT id FROM users WHERE email = '$ADMIN_EMAIL' OR (idp_provider = 'entra' AND idp_user_id = '$ENTRA_USER_ID') LIMIT 1;" | tr -d ' ')
              else
                # Create user
                psql -c "INSERT INTO users (id, idp_provider, idp_user_id, email, email_verified, display_name, given_name, family_name, active, app_metadata, created_at, updated_at, is_service_account, service_config) \
                      VALUES ('$USER_ID', 'entra', '$ENTRA_USER_ID', '$ADMIN_EMAIL', true, '$ENTRA_DISPLAY_NAME', '$ENTRA_GIVEN_NAME', '$ENTRA_SURNAME', true, '{}', NOW(), NOW(), false, '{}');"
                echo "Created platform admin user"
              fi

              # Get organization ID
              ORG_ID=$(psql \
                -t -c "SELECT id FROM organization WHERE name = '${ORG_NAME}';" | tr -d ' ')

              # Check if membership exists
              MEMBERSHIP_EXISTS=$(psql \
                -t -c "SELECT COUNT(*) FROM user_organization_memberships WHERE user_id = '$USER_ID' AND organization_id = '$ORG_ID';" | tr -d ' ')

              if [ "$MEMBERSHIP_EXISTS" = "1" ]; then
                echo "Membership already exists, updating to ensure owner role"
                psql -c "UPDATE user_organization_memberships SET roles = '{organization_owner}', status = 'active' WHERE user_id = '$USER_ID' AND organization_id = '$ORG_ID';"
              else
                # Create membership
                MEMBERSHIP_ID=$(psql -t -c "SELECT gen_random_uuid();" | tr -d ' ')
                psql -c "INSERT INTO user_organization_memberships (id, user_id, organization_id, roles, invited_at, joined_at, status) \
                      VALUES ('$MEMBERSHIP_ID', '$USER_ID', '$ORG_ID', '{organization_owner}', NOW(), NOW(), 'active');"
                echo "Created organization membership"
              fi

              # Show created user and membership
              echo "Platform admin user:"
              psql \
                -c "SELECT id, email, display_name, idp_provider FROM users WHERE email = '$ADMIN_EMAIL';"
              {{- end }}

              echo "Setup complete!"
          env:
            - name: PGHOST
              value: {{ .Values.postgresql.host | default (printf "%s-postgresql" .Release.Name) | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default "platform-database" }}
                  key: {{ .Values.postgresql.auth.secretKeys.usernameKey | default "username" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default "platform-database" }}
                  key: {{ .Values.postgresql.auth.secretKeys.userPasswordKey | default "password" }}
            - name: PGDATABASE
              value: {{ .Values.postgresql.auth.database | default "governance" | quote }}
            {{- if .Values.entra.createPlatformAdmin }}
            {{- $entraSecretName := (((.Values.global).secrets).auth).entra.secretName | default "platform-entra" }}
            - name: ENTRA_TENANT_ID
              value: {{ .Values.entra.tenantId | quote }}
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $entraSecretName | quote }}
                  key: "graph-client-id"
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $entraSecretName | quote }}
                  key: "graph-client-secret"
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      # This job should run after the application starts and runs migrations
      initContainers:
        - name: wait-for-schema
          image: postgres:17-alpine
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for database schema to be ready..."

              # Wait for database to be reachable
              until pg_isready -h $PGHOST -p 5432 -U $PGUSER; do
                echo "Waiting for database to be ready..."
                sleep 5
              done

              # Wait for required tables to exist (migrations run on app startup)
              echo "Checking for required tables..."
              REQUIRED_TABLES="organization users user_organization_memberships"
              MAX_ATTEMPTS=30
              ATTEMPT=1

              while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
                ALL_EXIST=true
                for TABLE in $REQUIRED_TABLES; do
                  EXISTS=$(psql -t -c "SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_name = '$TABLE');" | tr -d ' ')

                  if [ "$EXISTS" != "t" ]; then
                    ALL_EXIST=false
                    echo "Table $TABLE does not exist yet..."
                    break
                  fi
                done

                if [ "$ALL_EXIST" = "true" ]; then
                  echo "All required tables exist!"
                  exit 0
                fi

                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Waiting 10 seconds for migrations..."
                sleep 10
                ATTEMPT=$((ATTEMPT + 1))
              done

              echo "Warning: Some tables may not exist, but proceeding..."
              exit 0
          env:
            - name: PGHOST
              value: {{ .Values.postgresql.host | default (printf "%s-postgresql" .Release.Name) | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default "platform-database" }}
                  key: {{ .Values.postgresql.auth.secretKeys.usernameKey | default "username" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default "platform-database" }}
                  key: {{ .Values.postgresql.auth.secretKeys.userPasswordKey | default "password" }}
            - name: PGDATABASE
              value: {{ .Values.postgresql.auth.database | default "governance" | quote }}
{{- end }}
