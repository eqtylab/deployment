# Enablement Check
{{- if and .Values.global.secrets.create (eq .Values.global.secrets.keyManagement.provider "gcp_kms") }}

# Data Validation
{{- if not .Values.global.secrets.keyManagement.gcp_kms.secretName }}
  {{- fail "global.secrets.keyManagement.gcp_kms.secretName is required when key management provider is gcp_kms and create is true" }}
{{- end }}

# Secret Resource (only created if serviceAccountJson is provided)
{{- if .Values.global.secrets.keyManagement.gcp_kms.values.serviceAccountJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secrets.keyManagement.gcp_kms.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "governance-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.global.secrets.keyManagement.gcp_kms.keys.serviceAccountJson }}: {{ .Values.global.secrets.keyManagement.gcp_kms.values.serviceAccountJson | quote }}
{{- end }}
{{- end }}
